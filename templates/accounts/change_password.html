{% extends 'base.html' %}

{% block title %}Cambiar Contraseña - CHE GOLOSO{% endblock %}

{% block extra_css %}
<style>
    .password-card {
        border: none;
        border-radius: 1rem;
        overflow: hidden;
    }
    .password-header {
        background: linear-gradient(135deg, #2D1E5F, #E91E8C);
        padding: 1.5rem 2rem;
    }
    .password-header h4 {
        color: white;
        margin: 0;
        font-weight: 600;
    }
    .password-requirements {
        background: #f8f9fa;
        border-radius: 0.5rem;
        padding: 1rem;
        font-size: 0.875rem;
    }
    .password-requirements li {
        margin-bottom: 0.25rem;
    }
    .input-group-text {
        background: #E91E8C;
        border: none;
        color: white;
        min-width: 42px;
        justify-content: center;
    }
    .form-control:focus {
        border-color: #E91E8C;
        box-shadow: 0 0 0 0.2rem rgba(233, 30, 140, 0.15);
    }
    .btn-change-password {
        background: linear-gradient(135deg, #E91E8C, #2D1E5F);
        border: none;
        font-weight: 600;
        letter-spacing: 0.3px;
    }
    .btn-change-password:hover {
        background: linear-gradient(135deg, #2D1E5F, #E91E8C);
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(233, 30, 140, 0.3);
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card password-card shadow">
                <div class="password-header">
                    <h4><i class="fas fa-key me-2"></i>Cambiar Contraseña</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post" id="changePasswordForm">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="current_password" class="form-label fw-semibold">Contraseña Actual</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock"></i>
                                </span>
                                <input type="password" class="form-control" id="current_password" 
                                       name="current_password" placeholder="Ingresá tu contraseña actual" required>
                            </div>
                        </div>
                        
                        <hr class="my-3">
                        
                        <div class="mb-3">
                            <label for="new_password" class="form-label fw-semibold">Nueva Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock-open"></i>
                                </span>
                                <input type="password" class="form-control" id="new_password" 
                                       name="new_password" placeholder="Ingresá la nueva contraseña" 
                                       minlength="8" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label fw-semibold">Confirmar Nueva Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-check-double"></i>
                                </span>
                                <input type="password" class="form-control" id="confirm_password" 
                                       name="confirm_password" placeholder="Repetí la nueva contraseña" 
                                       minlength="8" required>
                            </div>
                        </div>
                        
                        <div class="password-requirements mb-4">
                            <strong><i class="fas fa-info-circle text-primary me-1"></i>Requisitos:</strong>
                            <ul class="mb-0 mt-1 ps-3">
                                <li>Mínimo 8 caracteres</li>
                                <li>Ambas contraseñas deben coincidir</li>
                            </ul>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-1"></i>Volver
                            </a>
                            <button type="submit" class="btn btn-change-password text-white">
                                <i class="fas fa-save me-1"></i>Cambiar Contraseña
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
