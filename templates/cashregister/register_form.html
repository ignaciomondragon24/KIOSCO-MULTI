{% extends 'base.html' %}

{% block title %}Nueva Caja Registradora - CHE GOLOSO{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0"><i class="fas fa-cash-register me-2"></i>Nueva Caja Registradora</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Código *</label>
                            <input type="text" name="code" class="form-control" placeholder="Ej: CAJA-01" required>
                            <small class="text-muted">Identificador único de la caja</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Nombre *</label>
                            <input type="text" name="name" class="form-control" placeholder="Ej: Caja Principal" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Ubicación</label>
                            <input type="text" name="location" class="form-control" placeholder="Ej: Entrada principal">
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Guardar
                            </button>
                            <a href="{% url 'cashregister:register_list' %}" class="btn btn-secondary">
                                <i class="fas fa-times me-2"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
