{% extends 'base.html' %}

{% block title %}Eliminar Promoción - CHE GOLOSO{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Eliminar Promoción</h5>
                </div>
                <div class="card-body">
                    <p>Estás por eliminar la promoción "<strong>{{ promotion.name }}</strong>".</p>
                    <p class="text-danger"><small><i class="fas fa-warning me-1"></i>Esta acción no se puede deshacer.</small></p>

                    <form method="post" class="mt-3">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="confirm_name" class="form-label">
                                Escribí "<strong>{{ promotion.name }}</strong>" para confirmar:
                            </label>
                            <input type="text" class="form-control" name="confirm_name" id="confirm_name"
                                   autocomplete="off" required>
                        </div>
                        <div class="d-flex gap-2">
                            <a href="{% url 'promotions:promotion_list' %}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash me-1"></i>Eliminar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
