{% extends 'base.html' %}

{% block title %}Eliminar Plantilla{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 500px;">
    <div class="card">
        <div class="card-body text-center">
            <i class="fas fa-exclamation-triangle fa-3x text-warning mb-3"></i>
            <h5>¿Eliminar esta plantilla?</h5>
            <p class="text-muted">
                <strong>{{ template.name }}</strong><br>
                {{ template.get_sign_type_display }} - {{ template.size_label }}
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <a href="{% url 'signage:template_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash me-1"></i>Eliminar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
